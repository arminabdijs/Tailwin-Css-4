<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* aspect-ratio: width / height; */
      /* aspect-ratio: 16 / 9; */
      /* height = width / aspect-ratio */

      .box {
        width: 300px;
        aspect-ratio: 1 / 1;
        /* aspect-ratio: 1 ; === aspect-ratio: 1 / 1; */
        background-color: steelblue;
        margin-bottom: 3rem;
      }

      .video {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: black;
        margin-bottom: 3rem;
      }

      img{
        aspect-ratio: 16 / 9;
        width: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
    <video
      class="video"
      src="../assets/video/videoplayback.mp4"
      controls
      preload="auto"
      poster="../assets/images/images.png"
    ></video>

    <img src="../assets/images/302012993_514401300604466_768154784961560815_n.png" alt="" >
  </body>
</html>
